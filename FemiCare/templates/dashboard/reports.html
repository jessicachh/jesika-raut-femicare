{% extends 'dashboard/main.html' %}
{% load static %}

{% block dashboard_content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-9">
      <div class="card border-0 shadow-sm" style="border-radius: 20px;">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <div>
              <p class="text-uppercase text-muted fw-semibold mb-2" style="letter-spacing: 0.12em; font-size: 0.78rem;">Reports</p>
              <h1 class="h3 mb-2">Export your health report</h1>
              <p class="text-muted mb-0" style="max-width: 44rem;">Generate a polished PDF summary of your tracked cycle insights, symptoms, and recommendations.</p>
            </div>
            <a href="{% url 'export_reports_pdf' %}" class="btn btn-danger btn-lg px-4 py-3">
              <i class="bi bi-file-earmark-pdf me-2"></i>Export PDF
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
