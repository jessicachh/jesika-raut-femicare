{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile Setup</title>
      <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css" />

 <style>
    body {
        font-family: 'Raleway', sans-serif;
        background: #f7f7f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 850px;
        background: #ffffff;
        padding: 35px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo {
        text-align: center;
        margin-bottom: 15px;
    }

    .logo img {
        height: 40px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
        color: #333;
    }

    form {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 8px;
        font-size: 14px;
        font-family: 'Open Sans', sans-serif;
        color: #444;
    }

    input {
        padding: 14px;
        font-size: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-family: 'Open Sans', sans-serif;
    }

    input:focus {
        outline: none;
        border-color: #b92222;
        box-shadow: 0 0 0 2px rgba(185, 34, 34, 0.1);
    }

    .row-2 {
        grid-column: span 2;
    }

    .full-width {
        grid-column: span 3;
    }

    button {
        grid-column: span 3;
        margin-top: 20px;
        padding: 14px;
        background: #b92222;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-family: 'Open Sans', sans-serif;
        transition: background 0.3s ease;
    }

    button:hover {
        background: #a11e1e;
    }

    .profile-validation-warning {
        grid-column: span 3;
        display: none;
        margin: 0;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #d9534f;
        background: #fff3f3;
        color: #b92222;
        font-size: 14px;
        font-family: 'Open Sans', sans-serif;
    }

    input.is-invalid {
        border-color: #d9534f;
        box-shadow: 0 0 0 2px rgba(217, 83, 79, 0.15);
    }

    .profile-toast-container {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 2147483647;
        display: grid;
        gap: 10px;
        width: min(92vw, 360px);
    }

    .profile-toast {
        border-radius: 10px;
        color: #fff;
        padding: 12px 14px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .profile-toast.hide {
        opacity: 0;
        transform: translateY(-8px);
    }

    .profile-toast.success { background: #1f8f4e; }
    .profile-toast.error,
    .profile-toast.danger { background: #b92222; }
    .profile-toast.warning { background: #d08a05; }
    .profile-toast.info { background: #1d6fa5; }

    .profile-toast-close {
        border: none;
        background: transparent;
        color: #fff;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 0;
    }

    @media (max-width: 768px) {
        form {
            grid-template-columns: 1fr;
        }

        .row-2,
        .full-width {
            grid-column: span 1;
        }
    }
</style>

</head>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
<body>
{% if messages %}
    <div class="profile-toast-container" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div class="profile-toast {{ message.tags|default:'info' }}" data-profile-toast>
                <div>{{ message }}</div>
                <button type="button" class="profile-toast-close" data-profile-toast-close aria-label="Close notification">&times;</button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="container">
    <div class="logo">
        <img src="{% static 'images/logo1.png' %}" alt="Logo">
        </div>
    <h2>Complete Your Profile</h2>

<form method="post" class="profile-form-validation">
  {% csrf_token %}

  <div class="form-group">
    <label>Date of Birth</label>
      <input type="date" name="dob" max="{% now 'Y-m-d' %}" value="{% if profile.date_of_birth %}{{ profile.date_of_birth|date:'Y-m-d' }}{% endif %}" required>
  </div>

  <div class="form-group row-2">
    <label>Height (cm)</label>
      <input type="number" name="height_cm" min="50" max="250" step="0.1" value="{{ profile.height_cm|default:'' }}" required>
  </div>

  <div class="form-group">
    <label>Weight (kg)</label>
      <input type="number" step="0.1" name="weight_kg" min="2" max="300" value="{{ profile.weight_kg|default:'' }}" required>
  </div>

  <button type="submit">Save Profile</button>
</form>


</div>

<script src="{% static 'js/profile-validation.js' %}"></script>
<script>
    (function () {
        var toasts = document.querySelectorAll('[data-profile-toast]');
        toasts.forEach(function (toast) {
            setTimeout(function () {
                toast.classList.add('hide');
                setTimeout(function () { toast.remove(); }, 250);
            }, 4200);
        });

        var closeButtons = document.querySelectorAll('[data-profile-toast-close]');
        closeButtons.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var toast = btn.closest('[data-profile-toast]');
                if (!toast) return;
                toast.classList.add('hide');
                setTimeout(function () { toast.remove(); }, 250);
            });
        });
    })();
</script>
</body>
</html>
