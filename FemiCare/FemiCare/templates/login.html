{% load static %}
{% load socialaccount %}

<head>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'css/component.css' %}">
</head>

<section class="login">
  <div class="login-container">
    
    <!-- LEFT SIDE (FORM) -->
    <div class="login-left">
      <div class="login-card">

        <div class="logo">
          <img src="{% static 'images/logo1.png' %}" alt="Logo">
        </div>

        <h1>Welcome Back</h1>

        <form method="post" action="{% url 'login' %}" class="login-form">
          {% csrf_token %}

          <label>Username</label>
          <input type="text" name="username" placeholder="yourusername" required>

          <label>Password</label>
          <input type="password" name="password" placeholder="********" required>

          <label class="remember-me-row" for="rememberMe">
            <input id="rememberMe" type="checkbox" name="remember_me">
            <span>Remember Me on this device</span>
          </label>

          <!-- ✅ FIXED FORGOT PASSWORD -->
          <a href="{% url 'password_reset' %}" class="forgot-password">
            Forgot Password?
          </a>

          <button class="login-btn" type="submit">Log In</button>
        </form>

        <!-- Messages -->
        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <p class="message" style="color: red;">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}

        <p class="signup-redirect">
          Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>

        <p class="or">or</p>

        {% if google_oauth_ready %}
        <a class="google-login-btn" href="{% provider_login_url 'google' process='login' %}">
          <i class="ph ph-google-logo"></i>
          Login with Google
        </a>
        {% else %}
        <button class="google-login-btn" type="button" disabled aria-disabled="true" title="Google login is not configured yet">
          <i class="ph ph-google-logo"></i>
          Login with Google (setup required)
        </button>
        {% endif %}

      </div>
    </div>

    <!-- RIGHT SIDE (IMAGE) -->
    <div class="login-right">
      <img src="{% static 'images/splash-img.jpg' %}" alt="Mindfulness Image">
    </div>

  </div>
</section>
