{% load static %}

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="{% static 'css/component.css' %}">
</head>
  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

<section class="login">
  <div class="login-container">
    <div class="login-left auth-single-panel">
      <div class="login-card auth-card-wide">
        <div class="logo">
          <img src="{% static 'images/logo1.png' %}" alt="Logo">
        </div>

        <h1>Set Up 2FA</h1>
        <p class="auth-subtitle">Add an extra security layer using a one-time verification code sent to your email.</p>

        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <p class="message auth-message-line">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}

        <form method="post" class="login-form auth-actions-vertical">
          {% csrf_token %}
          <button class="login-btn" type="submit" name="action" value="enable">Enable 2FA now</button>
          <button class="google-btn" type="submit" name="action" value="later">Do it later</button>
        </form>
      </div>
    </div>
  </div>
</section>
