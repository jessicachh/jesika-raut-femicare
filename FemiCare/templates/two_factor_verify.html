{% load static %}

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="{% static 'css/component.css' %}">
</head>

<section class="login">
  <div class="login-container">
    <div class="login-left auth-single-panel">
      <div class="login-card auth-card-wide">
        <div class="logo">
          <img src="{% static 'images/logo1.png' %}" alt="Logo">
        </div>

        <h1>{{ title|default:'Verification' }}</h1>
        <p class="auth-subtitle">{{ subtitle|default:'Enter your 6-digit verification code.' }}</p>

        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <p class="message auth-message-line">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}

        <form method="post" action="{% url verify_url_name %}" class="login-form">
          {% csrf_token %}
          <label for="verifyCode">Verification Code</label>
          <input id="verifyCode" type="text" name="code" maxlength="6" inputmode="numeric" placeholder="123456" required>
          <button class="login-btn" type="submit">Verify Code</button>
        </form>

        <form method="post" action="{% url resend_url_name %}" class="auth-inline-form">
          {% csrf_token %}
          <button class="google-btn" type="submit">Resend Code</button>
        </form>
      </div>
    </div>
  </div>
</section>
