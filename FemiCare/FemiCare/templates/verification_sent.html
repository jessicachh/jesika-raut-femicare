{% load static %}

<head>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="{% static 'css/component.css' %}">
</head>

<section class="login">
	<div class="login-container">
		<div class="login-left">
			<div class="login-card">
				<div class="logo">
					<img src="{% static 'images/logo1.png' %}" alt="Logo">
				</div>

				<h1>Verify Your Email</h1>
				<p class="signup-redirect" style="margin-bottom: 16px;">
					Enter the email you registered with and the 6-digit code sent to your inbox.
				</p>

				<form method="post" action="{% url 'verify_signup_email' %}" class="login-form">
					{% csrf_token %}

					<label for="{{ form.email.id_for_label }}">Email</label>
					{{ form.email }}

					<label for="{{ form.code.id_for_label }}">Verification Code</label>
					{{ form.code }}

					<button class="login-btn" type="submit">Verify Email</button>
				</form>

				<p class="signup-redirect">
					Already verified? <a href="{% url 'login' %}">Go to Login</a>
				</p>
			</div>
		</div>

		<div class="login-right">
			<img src="{% static 'images/splash-img.jpg' %}" alt="Mindfulness Image">
		</div>
	</div>
</section>

{% if messages %}
	<div class="auth-toast-container" aria-live="polite" aria-atomic="true">
		{% for message in messages %}
			<div class="auth-toast {{ message.tags|default:'info' }}" data-auth-toast>
				<div class="auth-toast-content">{{ message }}</div>
				<button type="button" class="auth-toast-close" aria-label="Close notification" data-auth-toast-close>&times;</button>
			</div>
		{% endfor %}
	</div>

	<script>
		(function () {
			var toasts = document.querySelectorAll('[data-auth-toast]');
			toasts.forEach(function (toast) {
				setTimeout(function () {
					toast.classList.add('hide');
					setTimeout(function () {
						toast.remove();
					}, 250);
				}, 4200);
			});

			var closeButtons = document.querySelectorAll('[data-auth-toast-close]');
			closeButtons.forEach(function (btn) {
				btn.addEventListener('click', function () {
					var toast = btn.closest('[data-auth-toast]');
					if (!toast) return;
					toast.classList.add('hide');
					setTimeout(function () {
						toast.remove();
					}, 250);
				});
			});
		})();
	</script>
{% endif %}
