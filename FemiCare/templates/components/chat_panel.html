{% load static %}

<!-- Chat Panel Overlay -->
<div class="chat-panel-overlay" id="chat-panel-overlay"></div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
    <div class="chat-panel-header">
        <h5><i class="bi bi-chat-dots"></i> Messages</h5>
        <button class="chat-panel-close" id="chat-panel-close">&times;</button>
    </div>

    <div class="chat-search">
        <input type="text" id="conversation-search" placeholder="Search conversations...">
    </div>

    <div class="conversations-list" id="conversations-list">
        <div class="empty-conversations">
            <i class="bi bi-chat-left-text"></i>
            <p>Loading conversations...</p>
        </div>
    </div>
</div>

<script>
    // Chat Panel JavaScript
    document.addEventListener('DOMContentLoaded', function() {
        const chatPanel = document.getElementById('chat-panel');
        const chatPanelOverlay = document.getElementById('chat-panel-overlay');
        const chatPanelClose = document.getElementById('chat-panel-close');
        const conversationsList = document.getElementById('conversations-list');
        const conversationSearch = document.getElementById('conversation-search');
        let allConversations = [];
        let wsConnection = null;

        // Open chat panel from sidebar
        const openChatPanelBtn = document.getElementById('open-chat-panel');
        if (openChatPanelBtn) {
            openChatPanelBtn.onclick = function(e) {
                e.preventDefault();
                openChatPanel();
            };
        }

        function openChatPanel() {
            chatPanel.classList.add('active');
            chatPanelOverlay.classList.add('active');
            loadConversations();
        }

        function closeChatPanel() {
            chatPanel.classList.remove('active');
            chatPanelOverlay.classList.remove('active');
        }

        // Event listeners
        if (chatPanelClose) {
            chatPanelClose.onclick = closeChatPanel;
        }

        if (chatPanelOverlay) {
            chatPanelOverlay.onclick = closeChatPanel;
        }

        // Load conversations from API
        async function loadConversations() {
            try {
                const response = await fetch('/api/conversations/');
                const data = await response.json();
                allConversations = data.conversations;
                displayConversations(allConversations);
                updateTotalUnreadBadge();
                connectWebSocket(); // Establish WebSocket connection for real-time updates
            } catch (error) {
                console.error('Error loading conversations:', error);
                conversationsList.innerHTML = `
                    <div class="empty-conversations">
                        <i class="bi bi-exclamation-circle"></i>
                        <p>Failed to load conversations</p>
                    </div>
                `;
            }
        }

        // Update total unread count in sidebar badge
        function updateTotalUnreadBadge() {
            const totalUnread = allConversations.reduce((sum, conv) => sum + conv.unread_count, 0);
            const badge = document.getElementById('total-unread-badge');
            if (badge) {
                if (totalUnread > 0) {
                    badge.textContent = totalUnread > 99 ? '99+' : totalUnread;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // Display conversations
        function displayConversations(conversations) {
            if (conversations.length === 0) {
                conversationsList.innerHTML = `
                    <div class="empty-conversations">
                        <i class="bi bi-chat-left-text"></i>
                        <p>No conversations yet</p>
                        <small>Start a consultation to begin chatting</small>
                    </div>
                `;
                return;
            }

            conversationsList.innerHTML = conversations.map(conv => {
                const timeAgo = getTimeAgo(new Date(conv.last_message_time));
                const unreadBadge = conv.unread_count > 0 ? 
                    `<span class="unread-badge">${conv.unread_count}</span>` : '';
                const unreadClass = conv.unread_count > 0 ? 'unread' : '';
                const avatarLetter = conv.other_user.name.charAt(0).toUpperCase();

                return `
                    <div class="conversation-item ${unreadClass}" data-appointment-id="${conv.appointment_id}" data-room-name="${conv.room_name}">
                        <div class="conversation-avatar">
                            ${avatarLetter}
                        </div>
                        <div class="conversation-content">
                            <div class="conversation-header">
                                <span class="conversation-name">${conv.other_user.name}</span>
                                <span class="conversation-time">${timeAgo}</span>
                            </div>
                            <div class="conversation-last-message">${conv.last_message}</div>
                            <div class="conversation-meta">
                                ${unreadBadge}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click listeners to conversation items
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.onclick = function() {
                    const appointmentId = this.dataset.appointmentId;
                    if (appointmentId && appointmentId !== 'null') {
                        window.location.href = `/chat/${appointmentId}/`;
                    } else {
                        alert('No active consultation found for this conversation');
                    }
                };
            });
        }

        // Search conversations
        if (conversationSearch) {
            conversationSearch.oninput = function() {
                const query = this.value.toLowerCase();
                const filtered = allConversations.filter(conv => 
                    conv.other_user.name.toLowerCase().includes(query)
                );
                displayConversations(filtered);
            };
        }

        // Helper function to calculate time ago
        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString();
        }

        // WebSocket connection for real-time updates
        function connectWebSocket() {
            // Try to connect if there are active conversations
            if (allConversations.length === 0) return;

            // Get the first conversation's room name to establish a connection
            // This allows us to listen for updates across all relevant rooms
            const firstRoom = allConversations[0]?.room_name;
            if (!firstRoom) return;

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/broadcast/`;

            try {
                wsConnection = new WebSocket(wsUrl);

                wsConnection.onopen = function(e) {
                    console.log('WebSocket connection established for real-time conversation updates');
                };

                wsConnection.onmessage = function(e) {
                    const data = JSON.parse(e.data);
                    
                    // Handle message event - refresh conversations
                    if (data.type === 'message' || data.type === 'file_message') {
                        // Refresh conversations list when new message arrives
                        if (chatPanel.classList.contains('active')) {
                            loadConversations();
                        } else {
                            // Just update the badge if panel is not open
                            fetch('/api/conversations/')
                                .then(response => response.json())
                                .then(data => {
                                    allConversations = data.conversations;
                                    updateTotalUnreadBadge();
                                });
                        }
                    }
                };

                wsConnection.onerror = function(error) {
                    console.error('WebSocket error:', error);
                };

                wsConnection.onclose = function(e) {
                    console.log('WebSocket connection closed');
                };
            } catch (error) {
                console.error('Failed to establish WebSocket:', error);
            }
        }

        // Refresh conversations periodically (every 30 seconds)
        setInterval(function() {
            if (chatPanel.classList.contains('active')) {
                loadConversations();
            }
        }, 30000);

        // Load conversations on page load to update badge
        loadConversations();

        // Also refresh badge every 30 seconds even when panel is closed
        setInterval(function() {
            if (!chatPanel.classList.contains('active')) {
                fetch('/api/conversations/')
                    .then(response => response.json())
                    .then(data => {
                        allConversations = data.conversations;
                        updateTotalUnreadBadge();
                    })
                    .catch(error => console.error('Error refreshing badge:', error));
            }
        }, 30000);
    });
</script>
