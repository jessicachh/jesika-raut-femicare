{% load static %}
{% load socialaccount %}

<head>
  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Open+Sans:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <!-- Phosphor Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'css/component.css' %}">
</head>

<section class="signup">
  <div class="signup-container">

    <!-- LEFT SIDE FULL IMAGE -->
    <div class="signup-left">
        <!-- BACK BUTTON -->
  <a href="{% url 'main' %}" class="back-btn">
    <i class="ph ph-arrow-left"></i>
  </a>
      <img src="{% static 'images/splash-img.jpg' %}" alt="Wellbeing Image">
    </div>

    <!-- RIGHT SIDE -->
    <div class="signup-right">

      <!-- WHITE CARD -->
      <div class="signup-card">
        
      <div class="logo">
        <img src="{% static 'images/logo1.png' %}" alt="Logo">
      </div>

        <h1>Create Your Account</h1>

<form method="post" action="{% url 'signup' %}" class="signup-form">
  {% csrf_token %}

  <div class="form-grid">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="JessicaRaut" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="jessica@example.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-field">
        <input type="password" name="password" placeholder="********" required data-password-input>
        <button type="button" class="password-toggle-btn" aria-label="Show password" data-password-toggle>
          <i class="ph ph-eye"></i>
        </button>
      </div>
    </div>
    
    <div class="form-group">
  <label>Confirm Password</label>
  <div class="password-field">
    <input type="password" name="confirm_password" placeholder="********" required data-password-input>
    <button type="button" class="password-toggle-btn" aria-label="Show password" data-password-toggle>
      <i class="ph ph-eye"></i>
    </button>
  </div>
</div>

    <div class="form-group">
      <label>Role</label>
      <select name="role" class="form-select-user">
        <option value="user">User</option>
        <option value="doctor">Doctor</option>
      </select>
    </div>
  </div>

  <button class="signup-btn" type="submit">Create Account</button>
</form>

        <p class="login-link">Already have an account? <a href="{% url 'login' %}">Login</a></p>
        <p class="or">or</p>

        <!-- GOOGLE SIGNUP -->
        {% if google_oauth_ready %}
        <a class="google-btn" href="{% provider_login_url 'google' process='signup' %}">
          <i class="ph ph-google-logo"></i>
          Sign up with Google
        </a>
        {% else %}
        <button class="google-btn" type="button" disabled aria-disabled="true" title="Google signup is not configured yet">
          <i class="ph ph-google-logo"></i>
          Sign up with Google (setup required)
        </button>
        {% endif %}

      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    document.querySelectorAll('.password-field').forEach(function (wrapper) {
      var field = wrapper.querySelector('[data-password-input]');
      var toggle = wrapper.querySelector('[data-password-toggle]');
      if (!field || !toggle) return;

      var icon = toggle.querySelector('i');
      toggle.addEventListener('click', function () {
        var isHidden = field.type === 'password';
        field.type = isHidden ? 'text' : 'password';
        toggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        if (icon) {
          icon.className = isHidden ? 'ph ph-eye-slash' : 'ph ph-eye';
        }
      });
    });
  })();
</script>

{% if messages %}
  <div class="auth-toast-container" aria-live="polite" aria-atomic="true">
    {% for message in messages %}
      <div class="auth-toast {{ message.tags|default:'info' }}" data-auth-toast>
        <div class="auth-toast-content">{{ message }}</div>
        <button type="button" class="auth-toast-close" aria-label="Close notification" data-auth-toast-close>&times;</button>
      </div>
    {% endfor %}
  </div>

  <script>
    (function () {
      var toasts = document.querySelectorAll('[data-auth-toast]');
      toasts.forEach(function (toast) {
        setTimeout(function () {
          toast.classList.add('hide');
          setTimeout(function () {
            toast.remove();
          }, 250);
        }, 4200);
      });

      var closeButtons = document.querySelectorAll('[data-auth-toast-close]');
      closeButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var toast = btn.closest('[data-auth-toast]');
          if (!toast) return;
          toast.classList.add('hide');
          setTimeout(function () {
            toast.remove();
          }, 250);
        });
      });
    })();
  </script>
{% endif %}
